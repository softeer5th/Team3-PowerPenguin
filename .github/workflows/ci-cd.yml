name: React:ON Back-End CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make application.properties
        run: |
          cd ./src/main/resources
          touch ./application.properties
          echo "${{ secrets.PROPERTIES }}" | tr -d '\r' > ./application.properties
        shell: bash

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test --build-cache

      - name: Check Build Artifact
        run: |
          ls -lh build/libs/ || (echo "Build artifact missing!" && exit 1)

      - name: Docker build
        run: |
          sudo docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}
          sudo docker pull ${{secrets.DOCKER_USERNAME}}/reacton:latest || true
          sudo docker build --cache-from ${{secrets.DOCKER_USERNAME}}/reacton-back-end:latest -f Dockerfile -t ${{secrets.DOCKER_USERNAME}}/reacton-back-end:latest .
          sudo docker push ${{ secrets.DOCKER_USERNAME}}/reacton-back-end:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            sudo docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}
            sudo docker-compose up -d --remove-orphans
            sudo docker image prune -f
            sudo docker logout